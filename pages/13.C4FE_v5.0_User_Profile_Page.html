<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Multi-Tenant SaaS Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
/* ================= THEME ================= */
body.light { background: linear-gradient(135deg,#FFF8E7,#D2B48C,#8B4513); color:#4B2E2B; }
body.dark { background: linear-gradient(135deg,#121212,#2c1f1a,#4a2f24); color:#FFF8E7; }

/* ================= GLASS ================= */
.glass{ backdrop-filter:blur(20px); background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.3); border-radius:1rem; box-shadow:0 8px 30px rgba(0,0,0,0.25); transition:.3s; }
body.dark .glass { background: rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color: #FFF8E7; }

/* ================= BUTTON ================= */
.btn{ background:linear-gradient(90deg,#6F4E37,#D2B48C,#A0522D); background-size:300%; animation:grad 4s linear infinite; color:white; padding:.7rem 1.4rem; border-radius:.75rem; font-weight:600; transition:.3s; }
.btn:hover{transform:scale(1.05)}
@keyframes grad{0%{background-position:0%}100%{background-position:300%}}
#logoutBtn{ font-weight:600; text-shadow:0 0 3px rgba(0,0,0,0.3); }

/* ================= LOCK ================= */
.locked{opacity:.5;pointer-events:none}

/* ================= POPUP ================= */
#overlay, #overlayCats{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:1;pointer-events:auto;transition:.4s;z-index:40;display:none;}
#preview, #popupCats{position:fixed;left:50%;transform:translateX(-50%);opacity:1;transition:.5s ease;z-index:50;width:90%;max-width:520px;display:none;}
#popupCats{bottom:-100%;transition:bottom .3s ease-in-out;}
#popupCats.show{bottom:50%;transform:translate(-50%,50%);}

/* ================= SAVE CHANGES SMOOTH PREVIEW MODAL ================= */
#preview {
  bottom: -100%;
  opacity: 0;
  transform: translate(-50%, 70%) scale(0.95);
  transition: transform 0.5s ease-out, opacity 0.5s ease-out, bottom 0.5s ease-out;
}
#preview.show {
  bottom: 50%;
  opacity: 1;
  transform: translate(-50%, 50%) scale(1);
}
#preview .glass {
  padding: 1.5rem;
  border-radius: 1.25rem;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}
body.dark #preview .glass {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #FFF8E7;
}
#preview h3 { font-size:1.2rem; margin-bottom:.75rem; }
#preview p { margin-bottom:.5rem; }
#preview button {
  width: 100%;
  background: linear-gradient(90deg,#6F4E37,#D2B48C,#A0522D);
  background-size: 300%;
  animation:grad 4s linear infinite;
  color:white;
  padding:.7rem 1.4rem;
  border-radius:.75rem;
  font-weight:600;
  border:none;
  cursor:pointer;
  transition: transform 0.3s ease;
}
#preview button:hover{ transform: scale(1.05); }

/* ================= TOGGLE ================= */
#themeToggle i{transition:.4s}

/* ================= INPUTS ================= */
input, select, textarea{ background: rgba(255,255,255,0.3); border-radius:0.5rem; border:none; padding:0.5rem; width:100%; color: inherit; }
body.dark input, body.dark select, body.dark textarea{ background: rgba(255,255,255,0.1); color: #FFF8E7; }

/* ================= IOS-STYLE TOGGLE SWITCH ================= */
.switch { position: relative; display: inline-block; width: 52px; height: 28px; margin-right: 10px; vertical-align: middle;}
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; border-radius: 34px; transition: 0.4s; }
.slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; border-radius: 50%; transition: 0.4s; }
input:checked + .slider { background-color: #6F4E37; }
input:checked + .slider:before { transform: translateX(24px); }
.switch-label { display: flex; align-items: center; cursor: pointer; font-weight:500; user-select:none; margin-bottom:6px; }

/* ================= CATEGORIES ALIGNMENT ================= */
#popupCats .glass label { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; cursor: pointer; }
#popupCats .glass label span { flex: 1; }
#popupCats .glass label input[type="checkbox"] { margin:0; flex-shrink:0; width:20px; height:20px; }
#popupCats .glass { max-height: unset; overflow-y: visible; }
#catsDropdown{text-align:left; white-space:normal;}
</style>
</head>
<body class="light p-6">

<!-- AUTH -->
<div id="auth" class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 hidden">
  <div class="glass p-6 w-full max-w-sm space-y-4 text-center">
    <h2 class="text-xl font-semibold">Login</h2>
    <input id="email" placeholder="Email" class="w-full p-2 rounded">
    <select id="role" class="w-full p-2 rounded">
      <option value="admin">Admin</option>
      <option value="vendor">Vendor</option>
      <option value="cafe_owner">Cafe Owner</option>
    </select>
    <input id="tenant" placeholder="Tenant ID (e.g cafe_001)" class="w-full p-2 rounded">
    <button class="btn w-full" onclick="login()">Login</button>
  </div>
</div>

<!-- HEADER -->
<div class="flex justify-between items-center mb-6 space-x-2">
  <div id="badge" class="glass px-4 py-2 text-sm"></div>
  <div class="flex items-center space-x-2">
    <button id="themeToggle" class="glass px-4 py-2 text-xl">
      <i class="fa-solid fa-sun"></i>
    </button>
    <button id="logoutBtn" class="btn hidden">Logout</button>
  </div>
</div>

<!-- MAIN GRID CONTAINER -->
<div class="grid md:grid-cols-3 gap-6 w-full max-w-full">

  <!-- BUSINESS INFO & PASSWORD -->
  <div class="glass p-6 md:col-span-2 space-y-4" id="business">
    <h2 class="text-xl font-semibold">Profile Settings</h2>
    
    <div>
      <label class="text-sm font-medium block mb-2">Username</label>
      <input id="bName" placeholder="Username" class="w-full p-2 rounded">
    </div>

    <div>
      <label class="text-sm font-medium block mb-2">Password</label>
      <div class="flex gap-2">
        <input id="bPassword" type="password" placeholder="Enter new password" class="flex-1 p-2 rounded">
        <button onclick="togglePasswordVisibility()" class="glass px-3 py-2 rounded" title="Show/Hide Password">
          <i id="pwdToggleIcon" class="fa-solid fa-eye"></i>
        </button>
      </div>
      <small class="text-gray-500">Leave blank to keep current password. Minimum 6 characters.</small>
    </div>

    <button class="btn w-full" onclick="saveChanges()">Save Changes</button>
  </div>

  <!-- ADMIN PANEL -->
  <div class="glass p-6 md:col-span-1 space-y-4 hidden" id="adminPanel">
    <h2 class="text-xl font-semibold">Admin Panel</h2>
    
    <div>
      <label class="text-sm font-medium block mb-2">Manage User Roles</label>
      <select id="userSelection" class="w-full p-2 rounded" onchange="updateUserRoleOptions()">
        <option value="">Select User</option>
      </select>
    </div>

    <div>
      <label class="text-sm font-medium block mb-2">Set Role to:</label>
      <div class="space-y-2">
        <button class="btn w-full text-sm" onclick="changeUserRole('admin')">Make Admin</button>
        <button class="btn w-full text-sm" onclick="changeUserRole('vendor')">Make Vendor</button>
        <button class="btn w-full text-sm" onclick="changeUserRole('cafe_owner')">Make Cafe Owner</button>
      </div>
    </div>
  </div>

</div>

<!-- CONFIRMATION MODAL -->
<div id="overlay"></div>
<div id="preview" class="space-y-4">
  <div class="glass p-4">
    <h3 class="font-semibold mb-2">Confirm Changes</h3>
    <p id="pvBusiness"></p>
    <p id="pvPassword"></p>
    <p id="pvUserRole"></p>
  </div>
  <div class="flex gap-2">
    <button class="btn flex-1" onclick="confirmChanges()">Confirm</button>
    <button class="btn flex-1" style="background: linear-gradient(90deg, #999, #bbb, #777);" onclick="closePreview()">Cancel</button>
  </div>
</div>

<script>
let session = null;
let currentUser = null;
let allUsers = [];
let pendingChanges = {};

// Load user profile on page load
window.addEventListener('load', loadUserProfile);

async function loadUserProfile() {
  try {
    const response = await fetch('../backend/user_profile.php', { credentials: 'include' });
    const data = await response.json();
    
    if (!response.ok) {
      alert('Error loading profile: ' + data.error);
      return;
    }

    currentUser = data.user;
    allUsers = data.allUsers || [];
    session = { role: data.role };

    // Populate form
    document.getElementById('bName').value = currentUser.username;

    // Show badge and logout button
    document.getElementById('badge').textContent = `${currentUser.username} (${data.role})`;
    document.getElementById('logoutBtn').classList.remove('hidden');

    // Show admin panel if user is admin
    if (data.role === 'admin') {
      document.getElementById('adminPanel').classList.remove('hidden');
      populateUserSelection();
    }

    // Apply RBAC
    applyRBAC(data.role);
  } catch (error) {
    console.error('Error:', error);
    alert('Failed to load profile');
  }
}

function applyRBAC(role) {
  const business = document.getElementById('business');
  if (role === 'visitor') {
    business.classList.add('locked');
  } else {
    business.classList.remove('locked');
  }
}

function populateUserSelection() {
  const select = document.getElementById('userSelection');
  select.innerHTML = '<option value="">Select User</option>';
  allUsers.forEach(user => {
    select.innerHTML += `<option value="${user.user_id}" data-role="${user.role}">${user.username} (${user.role})</option>`;
  });
}

function updateUserRoleOptions() {
  const select = document.getElementById('userSelection');
  const selectedOption = select.options[select.selectedIndex];
  if (selectedOption.value) {
    pendingChanges.targetUserId = selectedOption.value;
    pendingChanges.targetUserRole = selectedOption.dataset.role;
  }
}

function togglePasswordVisibility() {
  const passwordInput = document.getElementById('bPassword');
  const toggleIcon = document.getElementById('pwdToggleIcon');
  
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    toggleIcon.classList.remove('fa-eye');
    toggleIcon.classList.add('fa-eye-slash');
  } else {
    passwordInput.type = 'password';
    toggleIcon.classList.remove('fa-eye-slash');
    toggleIcon.classList.add('fa-eye');
  }
}

function saveChanges() {
  const username = document.getElementById('bName').value.trim();
  const password = document.getElementById('bPassword').value.trim();
  const selectedUserId = document.getElementById('userSelection').value;

  // Validation for vendor and cafe_owner
  if (session.role !== 'admin') {
    if (!username) {
      alert('Please enter a username');
      return;
    }
    if (username === currentUser.username && !password) {
      alert('No changes to save');
      return;
    }
  }

  // Prepare confirmation message
  let confirmMessage = '';
  
  if (username !== currentUser.username) {
    confirmMessage += `Username: ${currentUser.username} → ${username}\n`;
    pendingChanges.username = username;
  }
  
  if (password) {
    if (password.length < 6) {
      alert('Password must be at least 6 characters');
      return;
    }
    confirmMessage += `Password: Will be changed\n`;
    pendingChanges.password = password;
  }

  if (selectedUserId && document.getElementById('userSelection').options[document.getElementById('userSelection').selectedIndex].text) {
    const selectedUser = allUsers.find(u => u.user_id == selectedUserId);
    confirmMessage += `\nChange ${selectedUser.username}'s role to admin`;
    pendingChanges.roleChange = true;
  }

  if (!confirmMessage) {
    alert('No changes to save');
    return;
  }

  // Show confirmation modal
  document.getElementById('pvBusiness').textContent = confirmMessage;
  document.getElementById('pvPassword').textContent = '';
  document.getElementById('pvUserRole').textContent = '';

  document.getElementById('overlay').style.display = 'block';
  document.getElementById('preview').style.display = 'block';
  requestAnimationFrame(() => document.getElementById('preview').classList.add('show'));
}

async function confirmChanges() {
  try {
    // Update profile if username or password changed
    if (pendingChanges.username || pendingChanges.password) {
      const response = await fetch('../backend/update_profile.php', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: pendingChanges.username || null,
          password: pendingChanges.password || null
        })
      });

      const data = await response.json();
      if (!response.ok) {
        alert('Error updating profile: ' + data.error);
        return;
      }

      // Update current user info
      if (pendingChanges.username) {
        currentUser.username = pendingChanges.username;
        document.getElementById('bName').value = pendingChanges.username;
      }
      document.getElementById('bPassword').value = '';
    }

    // Update user role if admin changed a user
    if (pendingChanges.roleChange && pendingChanges.targetUserId) {
      const response = await fetch('../backend/update_user_role.php', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_id: pendingChanges.targetUserId,
          role: pendingChanges.newRole
})
      });

      const data = await response.json();
      if (!response.ok) {
        alert('Error updating user role: ' + data.error);
        return;
      }

      // Reload users list
      loadUserProfile();
    }

    alert('Changes saved successfully!');
    closePreview();
    pendingChanges = {};
  } catch (error) {
    console.error('Error:', error);
    alert('Failed to save changes');
  }
}

function closePreview() {
  document.getElementById('preview').classList.remove('show');
  setTimeout(() => {
    document.getElementById('preview').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
  }, 500);
}

document.getElementById('overlay').addEventListener('click', closePreview);

// Theme toggle
document.getElementById('themeToggle').onclick = () => {
  document.body.classList.toggle('dark');
  document.body.classList.toggle('light');
  document.getElementById('themeToggle').innerHTML = document.body.classList.contains('dark') 
    ? '<i class="fa-solid fa-moon"></i>' 
    : '<i class="fa-solid fa-sun"></i>';
  localStorage.setItem('theme', document.body.className);
};

// Logout
document.getElementById('logoutBtn').onclick = () => {
  localStorage.removeItem('jwt_demo');
  session = null;
  location.reload();
};

document.getElementById('userSelection').addEventListener('change', () => {
  const disabled = !document.getElementById('userSelection').value;
  document.querySelectorAll('#adminPanel button').forEach(btn => {
    btn.disabled = disabled;
    btn.style.opacity = disabled ? 0.5 : 1;
  });
});

// Load saved theme
const savedTheme = localStorage.getItem('theme');
if (savedTheme) document.body.className = savedTheme;

async function changeUserRole(role) {
  const selectedUserId = document.getElementById('userSelection').value;

  if (!selectedUserId) {
    alert('Please select a user first');
    return;
  }

  const selectedUser = allUsers.find(u => u.user_id == selectedUserId);

  if (!selectedUser) {
    alert('Invalid user selected');
    return;
  }

  // Save to pendingChanges (for confirmation modal)
  pendingChanges.targetUserId = selectedUserId;
  pendingChanges.newRole = role;
  pendingChanges.roleChange = true;

  // Show confirmation message
  document.getElementById('pvBusiness').textContent = '';
  document.getElementById('pvPassword').textContent = '';
  document.getElementById('pvUserRole').textContent =
    `Change ${selectedUser.username}'s role from ${selectedUser.role} → ${role}`;

  document.getElementById('overlay').style.display = 'block';
  document.getElementById('preview').style.display = 'block';
  requestAnimationFrame(() => document.getElementById('preview').classList.add('show'));
}

</script>
</body>
</html>
