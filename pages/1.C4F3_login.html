<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Coffee Shop Login</title>

  <style>
    /* Floating label */
    .floating-input:focus~label,
    .floating-input:not(:placeholder-shown)~label {
      transform: translateY(-1.5rem) scale(0.85);
      color: #D2691E;
    }

    /* Fade-in animation */
    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.8s ease-out forwards;
    }

    /* Gradient animation */
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .gradient-button {
      position: relative;
      overflow: hidden;
      z-index: 0;
      border-radius: 1rem;
      background: linear-gradient(to right, rgba(255, 248, 231, 0.2), rgba(255, 248, 231, 0.2));
    }

    .gradient-button::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(60deg, #A0522D, #D2691E, #8B4513, #A0522D);
      background-size: 400% 400%;
      animation: gradientMove 4s linear infinite;
      z-index: -1;
      filter: blur(10px);
      border-radius: 1rem;
    }

    .gradient-button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px rgba(160, 82, 45, 0.7),
                  0 0 30px rgba(210, 105, 30, 0.5);
    }

    /* Social buttons */
    .social-gradient {
      position: relative;
      overflow: hidden;
      border-radius: 0.75rem;
      background: linear-gradient(60deg, #6F4E37, #D2B48C, #A0522D, #8B4513);
      background-size: 400% 400%;
      animation: gradientMove 4s linear infinite;
      padding: 0.5rem 1rem;
      color: #FFF8E7;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease-in-out;
    }

    .social-gradient:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(255, 248, 231, 0.5);
    }

    /* Password toggle */
    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 1rem;
      transform: translateY(-50%);
      cursor: pointer;
      color: #FFF8E7aa;
    }

    .toggle-password:hover {
      color: #FFF8E7;
    }
  </style>
</head>

<body class="bg-gradient-to-tr from-[#6F4E37] to-[#D2B48C] flex items-center justify-center min-h-screen font-sans">

  <div class="w-full max-w-md mx-auto">

    <div class="relative bg-white/15 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/20 p-10 animate-fade-in-up">

      <!-- Logo -->
      <div class="flex justify-center mb-8">
        <img src="../static/logo1.png"
     class="h-24 w-24 object-contain bg-white p-2 rounded-full">
      </div>

      <!-- Headings -->
      <h2 class="text-3xl font-bold text-white text-center mb-2">
        Welcome!
      </h2>
      <p class="text-center text-white/80 mb-8">
        Please login to your account
      </p>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-6">

        <!-- Email -->
        <div class="relative">
          <input type="email" name="email" placeholder=" "
            class="floating-input w-full p-4 rounded-lg bg-white/25 text-white border border-white/40 focus:outline-none focus:ring-2 focus:ring-[#D2691E]"
            required />
          <label class="absolute left-4 top-4 text-white/80">Email</label>
        </div>

        <!-- Password -->
        <div class="relative password-wrapper">
          <input type="password" name="password" placeholder=" " id="password"
            class="floating-input w-full p-4 rounded-lg bg-white/25 text-white border border-white/40 focus:outline-none focus:ring-2 focus:ring-[#D2691E]"
            required />
          <label class="absolute left-4 top-4 text-white/80">Password</label>
          <span id="togglePassword" class="toggle-password">👁️</span>
        </div>

        <!-- Remember + Forgot -->
        <div class="flex justify-between items-center text-sm text-white/80">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="h-4 w-4 accent-[#D2691E]" /> Remember me
          </label>
        <!--  <a href="#" class="hover:underline text-white">Forgot password?</a> -->
        </div>

        <!-- Login Button -->
        <p id="errorMessage" class="text-white bg-red-600/80 px-4 py-2 rounded-lg text-center shadow-lg hidden"></p>

        <button type="submit"
          class="w-full gradient-button text-white py-3 font-semibold shadow-lg">
          Login
        </button>

        <!-- Divider -->
        <div class="flex items-center my-6 text-white/50">
          <hr class="flex-grow border-white/50" />
          <span class="mx-2">or</span>
          <hr class="flex-grow border-white/50" />
        </div>

        <!-- Social Login -->
        <div class="flex justify-center gap-4">
          <a href="#" class="social-gradient">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Logo_2013_Google.png"
              class="h-5 w-5"> Google
          </a>
          <a href="#" class="social-gradient">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png"
              class="h-5 w-5"> Facebook
          </a>
        </div>

      </form>

      <!-- Register -->
      <p class="mt-8 text-center text-white/80">
        Don’t have an account?
        <a href="2.C4F3_Registration.html"
          class="text-[#FFF8E7] font-semibold hover:underline">Register</a>
      </p>

    </div>

  </div>

  <script>
    // Toggle password visibility
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
    });
    
  </script>

  <script>
const form = document.getElementById("loginForm");
const errorMessage = document.getElementById("errorMessage");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);

  const response = await fetch("../backend/C4F3_login.php", {
    method: "POST",
    body: formData
  });

  const data = await response.json();

  if (data.status === "error") {
    errorMessage.textContent = data.message;
    errorMessage.classList.remove("hidden");
  } else {
    errorMessage.classList.add("hidden");
    window.location.href = data.redirect;
  }
});
</script>

</body>
</html>
