<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Partner Request Review</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
body {
    background: linear-gradient(135deg, #f7f3ee, #f2e6d9);
    font-family: 'Inter', sans-serif;
}

.toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: #4CAF50;
    color: #fff;
    padding: 0.75rem 1.5rem;
    border-radius: 0.5rem;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.4s;
    z-index: 1000;
    font-weight: 600;
}

.toast.error { background: #EF4444; }

.card-header {
    background: linear-gradient(90deg, #A0522D, #D2691E);
    color: white;
    padding: 0.75rem 1rem;
    border-radius: 0.75rem 0.75rem 0 0;
    font-weight: 600;
}

.card-content {
    padding: 1rem;
    border-radius: 0 0 0.75rem 0.75rem;
    background-color: #FFF8E7; /* soft coffee background */
}

.history-badge {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.25rem 0.5rem;
    border-radius: 0.375rem;
    background: #E5E7EB;
    color: #374151;
}

.badge {
    @apply px-4 py-2 rounded-lg text-sm font-semibold inline-block cursor-pointer border-2;
    transition: all 0.3s ease;
    opacity: 0.6;
}
.badge:hover {
    opacity: 1;
    transform: translateY(-2px);
}
.badge-pending { background: linear-gradient(135deg, #FFD580, #FFB347); color: #763C00; border-color: #FFB347; }
.badge-approved { background: linear-gradient(135deg, #85FFBD, #FFFB7D); color: #215100; border-color: #85FFBD; }
.badge-vendor_approved { background: linear-gradient(135deg, #9D4EDD, #C77DFF); color: #fff; border-color: #9D4EDD; }
.badge-rejected { background: linear-gradient(135deg, #FF7E5F, #FD3A69); color: #640000; border-color: #FF7E5F; }
.badge-all { background: linear-gradient(135deg, #6F7280, #9CA3AF); color: #fff; border-color: #6F7280; }

[contenteditable]:focus {
    outline: 2px solid #D2691E;
    background-color: rgba(210, 105, 30, 0.1);
    transition: 0.2s;
}

/* Coffee Gradient Buttons */
.gradient-action-btn {
    position: relative;
    overflow: hidden;
    z-index: 0;
    border-radius: 1rem;
    background: linear-gradient(to right, rgba(255,248,231,0.2), rgba(255,248,231,0.2));
    padding: 0.75rem 1.25rem;
    font-weight: 600;
    color: white;
    text-align: center;
    transition: all 0.3s ease;
    min-width: 120px;
    flex: 1;
    white-space: nowrap;
}

.gradient-action-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(60deg, #A0522D, #D2691E, #8B4513, #A0522D);
    background-size: 400% 400%;
    animation: gradientMove 4s linear infinite;
    z-index: -1;
    filter: blur(10px);
    border-radius: 1rem;
}

.gradient-action-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(210,105,30,0.6), 0 0 25px rgba(160,82,45,0.5);
}

/* Gradient Animation */
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
</style>
</head>
<body class="p-4 md:p-8">

<div class="container mx-auto max-w-4xl space-y-6">
    <!-- List View -->
    <div id="listView" class="hidden space-y-6">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Partnership Requests</h1>
        
        <!-- Filters -->
        <div class="flex flex-wrap gap-3 justify-center mb-6">
            <button class="filter-btn badge badge-all" data-filter="all">All</button>
            <button class="filter-btn badge badge-pending" data-filter="pending">Pending</button>
            <button class="filter-btn badge badge-approved" data-filter="approved">Approved</button>
            <button class="filter-btn badge badge-vendor_approved" data-filter="vendor_approved">Vendor Approved</button>
            <button class="filter-btn badge badge-rejected" data-filter="rejected">Rejected</button>
        </div>
        
        <!-- Requests List -->
        <div id="requestsList" class="space-y-4">
            <p class="text-center text-gray-600">Loading...</p>
        </div>
    </div>

    <!-- Detail View -->
    <div id="detailView" class="hidden space-y-6">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Partnership Request Review</h1>
        
        <div class="shadow-xl rounded-xl overflow-hidden border border-gray-200">
            <div class="card-header text-lg">Request Details</div>
            <div class="card-content space-y-4">
                <div class="flex flex-col space-y-1">
                    <span class="text-gray-500 text-sm">Cafe Name</span>
                    <p class="w-full p-3 border border-gray-300 text-gray-700 font-medium rounded-md bg-white" id="cafeName">-</p>
                </div>
                <div class="flex flex-col space-y-1">
                    <span class="text-gray-500 text-sm">Requested Product</span>
                    <p class="w-full p-3 border border-gray-300 text-gray-700 font-medium rounded-md bg-white" id="productName">-</p>
                </div>
                <div class="flex flex-col space-y-1">
                    <span class="text-gray-500 text-sm">Proposed Terms</span>
                    <p class="w-full p-3 border border-gray-300 text-gray-700 rounded-md bg-white" id="terms">-</p>
                </div>
                <div class="flex flex-col space-y-1">
                    <span class="text-gray-500 text-sm">Message</span>
                    <p class="w-full h-40 p-3 border border-gray-300 text-gray-700 rounded-md bg-white overflow-y-auto" id="message">-</p>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="shadow-xl rounded-xl overflow-hidden border border-gray-200">
            <div class="card-content space-y-4">
                <div class="flex flex-col md:flex-row gap-3">
                    <button id="approveBtn" class="gradient-action-btn flex-1">Approve</button>
                    <button id="rejectBtn" class="gradient-action-btn flex-1">Reject</button>
                </div>
            </div>
        </div>
    </div>

</div>

<div id="toast" class="toast"></div>

<script>
// Get URL parameters
const urlParams = new URLSearchParams(window.location.search);
const requestId = urlParams.get('request_id');
const filter = urlParams.get('filter') || 'pending';

// Toast function
function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = type === 'error' ? 'toast error' : 'toast';
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, 2000);
}

// Determine which view to show
if (requestId) {
    // Detail View
    document.getElementById('detailView').classList.remove('hidden');
    
    // Load request data
    async function loadRequest() {
        try {
            const response = await fetch(`../backend/vendor_partnership_review.php?request_id=${requestId}`, {
                credentials: 'include'
            });
            const data = await response.json();
            
            if (data.error) {
                showToast('Error: ' + data.error, 'error');
                return;
            }
            
            // Populate fields
            document.getElementById('cafeName').textContent = data.cafe_name || '-';
            document.getElementById('productName').textContent = data.product_name || '-';
            document.getElementById('terms').textContent = data.proposed_terms || '-';
            document.getElementById('message').textContent = data.message || '-';
            
        } catch (e) {
            console.error('Error loading request:', e);
            showToast('Failed to load request data', 'error');
        }
    }
    
    // Approve button
    document.getElementById('approveBtn').addEventListener('click', async () => {
        if (confirm('Are you sure you want to approve this partnership request?')) {
            try {
                const response = await fetch('../backend/vendor_partnership_action.php', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({request_id: requestId, action: 'approve'})
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast('Request Approved ✅');
                    setTimeout(() => window.history.back(), 1500);
                } else {
                    showToast('Error: ' + (data.error || 'Failed to approve'), 'error');
                }
            } catch (e) {
                console.error('Error approving request:', e);
                showToast('Error approving request', 'error');
            }
        }
    });
    
    // Reject button
    document.getElementById('rejectBtn').addEventListener('click', async () => {
        if (confirm('Are you sure you want to reject this partnership request?')) {
            try {
                const response = await fetch('../backend/vendor_partnership_action.php', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({request_id: requestId, action: 'reject'})
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast('Request Rejected ❌');
                    setTimeout(() => window.history.back(), 1500);
                } else {
                    showToast('Error: ' + (data.error || 'Failed to reject'), 'error');
                }
            } catch (e) {
                console.error('Error rejecting request:', e);
                showToast('Error rejecting request', 'error');
            }
        }
    });
    
    loadRequest();
    
} else {
    // List View
    document.getElementById('listView').classList.remove('hidden');
    
    // Load list of requests
    async function loadRequests(currentFilter) {
        try {
            const response = await fetch(`../backend/vendor_partnership_list.php?filter=${currentFilter}`, {
                credentials: 'include'
            });
            const data = await response.json();
            
            if (data.error) {
                showToast('Error: ' + data.error, 'error');
                return;
            }
            
            const requestsList = document.getElementById('requestsList');
            if (data.requests.length > 0) {
                requestsList.innerHTML = data.requests.map(req => `
                    <div class="shadow-xl rounded-xl overflow-hidden border border-gray-200 p-6 hover:shadow-2xl transition">
                        <div class="flex items-center justify-between">
                            <div class="flex-1">
                                <h3 class="text-lg font-bold text-gray-800">${req.cafe_name}</h3>
                                <p class="text-gray-600">${req.product_name}</p>
                                <p class="text-xs text-gray-500 mt-2">${new Date(req.created_at).toLocaleDateString()}</p>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="px-3 py-1 rounded-full text-xs font-semibold badge badge-${req.status}">${req.status.replace('_', ' ').toUpperCase()}</span>
                                <a href="9.C4F3_Vendor_Partnership_Request_Review_Page.html?request_id=${req.request_id}" class="gradient-action-btn px-4 py-2">View</a>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                requestsList.innerHTML = '<p class="text-center text-gray-600 py-8">No requests found</p>';
            }
        } catch (e) {
            console.error('Error loading requests:', e);
            showToast('Failed to load requests', 'error');
        }
    }
    
    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.style.opacity = '0.6');
            btn.style.opacity = '1';
            const newFilter = btn.dataset.filter;
            window.location.search = `?filter=${newFilter}`;
        });
        
        // Highlight current filter
        if (btn.dataset.filter === filter) {
            btn.style.opacity = '1';
        } else {
            btn.style.opacity = '0.6';
        }
    });
    
    loadRequests(filter);
}
</script>
</script>

</body>
</html>
