<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Messaging Interface</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* --- Coffee Gradient / Glow Buttons --- */
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.gradient-btn {
  position: relative;
  overflow: hidden;
  border-radius: 1rem;
  font-weight: 600;
  color: #FFF8E7;
  padding: 0.5rem 1.25rem;
  background: linear-gradient(60deg, #6F4E37, #D2B48C, #A0522D, #8B4513);
  background-size: 400% 400%;
  animation: gradientMove 4s linear infinite;
  transition: all 0.3s ease-in-out;
}
.gradient-btn::before {
  content: '';
  position: absolute;
  inset: -50%;
  background: inherit;
  background-size: 400% 400%;
  animation: gradientMove 4s linear infinite;
  filter: blur(15px);
  z-index: -1;
  border-radius: 1rem;
}
.gradient-btn:hover {
  transform: scale(1.03);
  box-shadow: 0 0 20px rgba(210,105,30,0.6), 0 0 30px rgba(111,78,55,0.5);
}

/* --- Chat Bubbles --- */
.outgoing {
  background: linear-gradient(135deg, #6F4E37, #A0522D);
  color: #FFF8E7;
  border-radius: 1rem 1rem 0 1rem;
  padding: 0.75rem 1rem;
  max-width: 70%;
  box-shadow: 0 3px 8px rgba(111,78,55,0.3);
  position: relative;
  word-break: break-word;
  transition: transform 0.2s, box-shadow 0.3s;
}
.incoming {
  background: linear-gradient(135deg, #F8F3EE, #D2B48C);
  color: #4B2E2B;
  border-radius: 1rem 1rem 1rem 0;
  padding: 0.75rem 1rem;
  max-width: 70%;
  box-shadow: 0 3px 8px rgba(210,180,140,0.3);
  word-break: break-word;
  transition: transform 0.2s, box-shadow 0.3s;
}
.outgoing:hover, .incoming:hover {
  transform: scale(1.03);
  box-shadow: 0 0 15px rgba(255,248,231,0.5), 0 0 25px rgba(111,78,55,0.5);
}

/* --- Fade-in animation --- */
@keyframes fadeUp { from { opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);} }
.chat-animate { animation: fadeUp 0.5s ease-out forwards; }

/* --- Message timestamp --- */
.message-time { font-size:0.65rem; opacity:0.7; text-align:right; margin-top:0.25rem; }

/* --- Typing indicator --- */
.typing { display:flex; gap:4px; }
.typing-dot { width:6px; height:6px; background:#6F4E37; border-radius:50%; animation: blink 1s infinite; }
.typing-dot:nth-child(2){ animation-delay:0.2s; }
.typing-dot:nth-child(3){ animation-delay:0.4s; }
@keyframes blink {0%,80%,100%{opacity:0;} 40%{opacity:1;} }

/* --- Dark Mode --- */
.dark-mode { background-color:#1f1f1f; color:#f3f3f3; }
.dark-mode .bg-white { background-color:#2a2a2a !important; }
.dark-mode .bg-gray-200 { background-color:#3a3a3a !important; color:#f3f3f3; }
.dark-mode .border-gray-200 { border-color:#555 !important; }
.dark-mode .focus\:ring-coffee { --tw-ring-color: #D2B48C; }
.dark-mode .emoji-picker { background-color:#2a2a2a !important; }

/* --- Emoji Picker --- */
.emoji-picker {
  position: absolute; bottom: calc(100% + 10px); right: 20px;
  background:white; border-radius:1rem; padding:0.5rem;
  display:none; grid-template-columns: repeat(6, 1fr); gap:0.25rem;
  box-shadow:0 5px 15px rgba(0,0,0,0.3); z-index:1000;
  min-width:200px;
  pointer-events: auto;
}
.emoji-picker span {
  cursor:pointer;
  font-size:1.2rem;
  transition: transform 0.2s;
  pointer-events: auto;
  user-select: none;
}
.emoji-picker span:hover { transform: scale(1.3); }

#chatMessages { scroll-behavior: smooth; }
</style>
</head>
<body class="bg-cream font-sans p-4 md:p-8 transition-colors duration-300">

<div class="flex justify-end mb-4">
  <button id="toggleDark" class="gradient-btn text-sm">Toggle Dark Mode</button>
</div>

<div class="container mx-auto max-w-7xl bg-[#FFF8E7] border border-[#D2B48C] shadow-lg rounded-lg flex h-[80vh]">

  <!-- Chat List -->
  <div class="w-full md:w-80 flex-shrink-0 border-r border-[#D2B48C] flex flex-col bg-[#F8F3EE] rounded-l-lg">
    <div class="p-4 border-b border-[#D2B48C] h-20 flex items-center">
      <input type="text" placeholder="Search conversations" 
             class="w-full p-2 border border-dashed border-[#D2B48C] focus:outline-none text-sm rounded-md bg-[#FFF8E7]">
    </div>
    <div class="flex-grow overflow-y-auto space-y-2 p-4" id="chatList">
      <!-- Conversations will be loaded dynamically -->
    </div>
  </div>

  <!-- Chat Window -->
  <div class="flex-grow flex flex-col bg-[#FFF8E7] rounded-r-lg">
    <div class="p-4 border-b border-[#D2B48C] flex items-center justify-between">
      <h2 class="text-lg font-semibold text-[#4B2E2B]" id="chatTitle">Select a conversation to start messaging</h2>
      <button class="gradient-btn" id="newMessageBtn">New Message</button>
    </div>

    <div class="flex-grow p-6 overflow-y-auto space-y-4" id="chatMessages">
      <div class="text-center text-gray-500 mt-8">
        <p class="text-lg mb-2">Welcome to Messaging!</p>
        <p>Select a user from the left panel to start a conversation.</p>
        <p class="text-sm mt-4">💡 Tip: Click on any user to begin messaging them.</p>
      </div>
    </div>

    <!-- Chat Input with Emoji -->
    <div class="p-4 border-t border-[#D2B48C] relative">
      <div class="flex items-center">
        <input type="text" placeholder="Type a message" id="chatInput"
               class="flex-grow p-3 border border-[#D2B48C] focus:outline-none focus:ring-2 focus:ring-coffee rounded-l-md text-sm bg-[#FFF8E7]">
        <button id="emojiBtn" class="gradient-btn mx-2 rounded-full text-lg">😀</button>
        <button id="sendBtn" class="gradient-btn rounded-r-md">Send</button>
      </div>

      <!-- Emoji Picker -->
      <div id="emojiPicker" class="emoji-picker grid">
        <span>😀</span><span>😂</span><span>😍</span><span>👍</span><span>🎉</span><span>🙌</span>
        <span>😢</span><span>😎</span><span>😡</span><span>👏</span><span>💯</span><span>🔥</span>
      </div>
    </div>

<!-- New Message Modal -->
<div id="newMessageModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-md w-full mx-4 max-h-[80vh] flex flex-col">
    <div class="p-4 border-b border-gray-200 dark:border-gray-700">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Start New Conversation</h3>
    </div>
    <div class="p-4">
      <input type="text" id="userSearchInput" placeholder="Search users by name or email..."
             class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-coffee text-sm bg-white dark:bg-gray-700 dark:text-white">
      <div id="searchResults" class="mt-3 max-h-60 overflow-y-auto space-y-2">
        <!-- Search results will appear here -->
      </div>
    </div>
    <div class="p-4 border-t border-gray-200 dark:border-gray-700 flex justify-end space-x-2">
      <button id="cancelNewMessage" class="px-4 py-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md">Cancel</button>
    </div>
  </div>
</div>

<script>
let activeChat = null;
let currentUserId = null;

// --- Initialize ---
async function initializeMessaging() {
  // Check if user is logged in
  try {
    const response = await fetch('../backend/check_session.php', {
      method: 'GET',
      credentials: 'same-origin',
      headers: {
        'Cache-Control': 'no-cache'
      }
    });

    if (!response.ok) {
      alert('Error checking session. Please try logging in again.');
      window.location.href = '1.C4F3_login.html';
      return;
    }

    const sessionData = await response.json();

    if (!sessionData.logged_in) {
      alert('Please log in to access messaging');
      window.location.href = '1.C4F3_login.html';
      return;
    }

    currentUserId = sessionData.user_id;
    await loadConversations();
  } catch (error) {
    alert('Error loading messaging system: ' + error.message);
  }
}

// --- Load Conversations ---
async function loadConversations() {
  try {
    const response = await fetch('../backend/get_conversations.php');

    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(`HTTP ${response.status}: ${errorText}`);
    }

    const data = await response.json();

    if (data.success) {
      renderConversations(data.conversations);
    } else {
      alert('Error loading conversations: ' + data.message);
    }
  } catch (error) {
    alert('Error loading conversations: ' + error.message);
  }
}

// --- Render Conversations ---
function renderConversations(conversations) {
  const chatList = document.getElementById("chatList");
  chatList.innerHTML = "";

  if (conversations.length === 0) {
    chatList.innerHTML = `
      <div class="p-4 text-center text-gray-500">
        <p class="mb-2">No conversations yet.</p>
        <p class="text-sm">Click "New Message" to start chatting with someone!</p>
      </div>
    `;
    return;
  }

  conversations.forEach(conv => {
    const convDiv = document.createElement("div");
    convDiv.className = "flex items-center justify-between p-3 border border-[#D2B48C] rounded-lg cursor-pointer chat-item";
    convDiv.dataset.userId = conv.user_id;
    convDiv.innerHTML = `
      <span class="font-semibold text-[#4B2E2B]">${conv.display_name}</span>
      ${conv.unread_count > 0 ? `<span class="badge px-2 py-0.5 text-xs font-bold text-white bg-blue-500 rounded-full">${conv.unread_count}</span>` : ''}
    `;
    convDiv.addEventListener("click", () => switchChat(conv.user_id, conv.display_name));
    chatList.appendChild(convDiv);
  });
}

// --- Switch Chat ---
async function switchChat(userId, displayName) {
  activeChat = userId;
  document.getElementById("chatTitle").textContent = "Chat with " + displayName;

  // Mark messages as read
  await markAsRead(userId);

  // Load messages
  await loadMessages(userId);

  // Update active state
  document.querySelectorAll('.chat-item').forEach(item => {
    item.classList.remove('bg-[#F0E5D8]');
    if (item.dataset.userId == userId) {
      item.classList.add('bg-[#F0E5D8]');
    }
  });
}

// --- Load Messages ---
async function loadMessages(userId) {
  try {
    const response = await fetch(`../backend/get_messages.php?user_id=${userId}`);
    const data = await response.json();

    if (data.success) {
      renderMessages(data.messages);
    }
  } catch (error) {
    // Silently handle message loading errors
  }
}

// --- Render Messages ---
function renderMessages(messages) {
  const chatMessages = document.getElementById("chatMessages");
  chatMessages.innerHTML = "";

  messages.forEach(msg => {
    addMessage(msg.text, msg.me, msg.time);
  });
}

// --- Add Message ---
function addMessage(text, me = true, time = null) {
  const msgTime = time || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const msgDiv = document.createElement("div");
  msgDiv.className = `flex ${me ? 'justify-end' : 'justify-start'} chat-animate message-container`;

  const bubble = document.createElement("div");
  bubble.className = me ? "outgoing" : "incoming";
  bubble.innerHTML = `<span class="message-text">${text}</span>
                      <div class="message-time">${msgTime}</div>`;
  msgDiv.appendChild(bubble);
  document.getElementById("chatMessages").appendChild(msgDiv);
  document.getElementById("chatMessages").scrollTop = document.getElementById("chatMessages").scrollHeight;
}

// --- Send Message ---
async function sendMessage() {
  const chatInput = document.getElementById("chatInput");
  const text = chatInput.value.trim();
  if (!text || !activeChat) return;

  try {
    const response = await fetch('../backend/send_message.php', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        receiver_id: activeChat,
        message: text
      })
    });

    const data = await response.json();

    if (data.success) {
      addMessage(text, true);
      chatInput.value = "";
      // Refresh conversations to update last message time
      await loadConversations();
    } else {
      alert('Error sending message: ' + data.message);
    }
  } catch (error) {
    alert('Error sending message');
  }
}

// --- Mark as Read ---
async function markAsRead(userId) {
  try {
    await fetch(`../backend/mark_read.php?user_id=${userId}`);
  } catch (error) {
    // Silently handle read status errors
  }
}

// --- New Message Modal Functions ---
function openNewMessageModal() {
  const modal = document.getElementById("newMessageModal");
  const searchInput = document.getElementById("userSearchInput");
  const searchResults = document.getElementById("searchResults");

  searchInput.value = "";
  searchResults.innerHTML = '<div class="text-center text-gray-500 text-sm">Start typing to search for users...</div>';
  modal.classList.remove("hidden");
  modal.classList.add("flex");
  searchInput.focus();
}

function closeNewMessageModal() {
  const modal = document.getElementById("newMessageModal");
  modal.classList.add("hidden");
  modal.classList.remove("flex");
}

// --- Search Users ---
async function searchUsers(query) {
  if (query.length < 2) {
    document.getElementById("searchResults").innerHTML = '<div class="text-center text-gray-500 text-sm">Type at least 2 characters to search...</div>';
    return;
  }

  try {
    const response = await fetch(`../backend/search_users.php?search=${encodeURIComponent(query)}`);
    const data = await response.json();

    if (data.success) {
      renderSearchResults(data.users);
    } else {
      document.getElementById("searchResults").innerHTML = '<div class="text-center text-red-500 text-sm">Error searching users</div>';
    }
  } catch (error) {
    document.getElementById("searchResults").innerHTML = '<div class="text-center text-red-500 text-sm">Error searching users</div>';
  }
}

// --- Render Search Results ---
function renderSearchResults(users) {
  const searchResults = document.getElementById("searchResults");

  if (users.length === 0) {
    searchResults.innerHTML = '<div class="text-center text-gray-500 text-sm">No users found</div>';
    return;
  }

  searchResults.innerHTML = "";
  users.forEach(user => {
    const userDiv = document.createElement("div");
    userDiv.className = "flex items-center justify-between p-3 border border-gray-200 dark:border-gray-600 rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700";
    userDiv.innerHTML = `
      <div>
        <div class="font-semibold text-gray-900 dark:text-white">${user.display_name}</div>
        <div class="text-sm text-gray-500 dark:text-gray-400">${user.email}</div>
      </div>
      <button class="message-user-btn px-3 py-1 text-sm bg-coffee text-white rounded-md hover:bg-opacity-80" data-user-id="${user.user_id}" data-display-name="${user.display_name}">Message</button>
    `;
    userDiv.querySelector('.message-user-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      startConversationWithUser(user.user_id, user.display_name);
    });
    searchResults.appendChild(userDiv);
  });
}

// --- Start Conversation ---
function startConversationWithUser(userId, displayName) {
  closeNewMessageModal();
  switchChat(userId, displayName);
}

// --- Event Listeners ---
document.getElementById("sendBtn").addEventListener("click", sendMessage);
document.getElementById("chatInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    sendMessage();
  }
});

document.getElementById("newMessageBtn").addEventListener("click", () => {
  openNewMessageModal();
});

document.getElementById("toggleDark").addEventListener("click", () => {
  document.body.classList.toggle("dark-mode");
});

// --- Search Modal Event Listeners ---
document.getElementById("cancelNewMessage").addEventListener("click", closeNewMessageModal);

document.getElementById("userSearchInput").addEventListener("input", (e) => {
  const query = e.target.value.trim();
  searchUsers(query);
});

document.getElementById("userSearchInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
  }
});

// Close modal when clicking outside
document.getElementById("newMessageModal").addEventListener("click", (e) => {
  if (e.target.id === "newMessageModal") {
    closeNewMessageModal();
  }
});

// --- Emoji Picker ---
const emojiPicker = document.getElementById("emojiPicker");
const emojiBtn = document.getElementById("emojiBtn");

emojiBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  emojiPicker.style.display = emojiPicker.style.display === "grid" ? "none" : "grid";
});

emojiPicker.querySelectorAll("span").forEach(emoji => {
  emoji.addEventListener("click", () => {
    document.getElementById("chatInput").value += emoji.textContent;
    emojiPicker.style.display = "none";
    document.getElementById("chatInput").focus();
  });
});

document.addEventListener("click", (e) => {
  if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) {
    emojiPicker.style.display = "none";
  }
});

// --- Initialize on page load ---
document.addEventListener("DOMContentLoaded", initializeMessaging);
</script>
</body>
</html>
