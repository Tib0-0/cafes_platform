<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Partnership Decision - Coffee Theme</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
    body {
        background: linear-gradient(135deg, #a9746e, #f4e1d2);
        position: relative;
        overflow-x: hidden;
        min-height: 100vh;
        font-family: sans-serif;
        transition: background 0.5s, color 0.5s;
        color: #3e2f2f;
    }

    /* Steam Animation */
    .steam {
        position: absolute;
        bottom: 0;
        width: 20px;
        height: 80px;
        background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%);
        border-radius: 50%;
        opacity: 0.5;
        animation: rise 6s linear infinite;
        pointer-events: none;
    }
    .steam:nth-child(1) { left: 20%; animation-delay: 0s; }
    .steam:nth-child(2) { left: 40%; animation-delay: 2s; }
    .steam:nth-child(3) { left: 60%; animation-delay: 1s; }
    .steam:nth-child(4) { left: 80%; animation-delay: 3s; }

    @keyframes rise {
        0% { transform: translateY(0) scaleX(0.5) scaleY(0.5); opacity: 0.3; }
        50% { transform: translateY(-150px) scaleX(0.7) scaleY(0.7); opacity: 0.5; }
        100% { transform: translateY(-300px) scaleX(1) scaleY(1); opacity: 0; }
    }

    /* Glass Cards */
    .glass-card {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #3e2f2f;
        transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.5s, color 0.5s;
        position: relative;
        overflow: hidden;
        animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
        100% { transform: translateY(0px); }
    }

    /* Coffee cup */
    .coffee-cup { position: relative; display: inline-block; width: 20px; height: 20px; color: #3e2f2f; }
    .coffee-cup i { font-size: 20px; }
    .coffee-cup::before, .coffee-cup::after {
        content: ''; position: absolute; top: -12px; left: 50%; width: 2px; height: 12px; background: rgba(255,255,255,0.6);
        border-radius: 50%; transform: translateX(-50%); animation: steamUp 2s infinite ease-in-out;
    }
    .coffee-cup::after { left: 60%; animation-delay: 0.5s; }

    @keyframes steamUp {
        0% { transform: translateY(0) scaleX(0.5); opacity: 0; }
        50% { transform: translateY(-12px) scaleX(0.7); opacity: 0.5; }
        100% { transform: translateY(-24px) scaleX(1); opacity: 0; }
    }

    /* Buttons & Modal */
    .btn-approve, .btn-reject, .modal button {
        position: relative;
        overflow: hidden;
        transition: background 0.4s, color 0.4s;
    }
    .btn-approve, .btn-reject {
        padding: 0.75rem 1.5rem;
        border-radius: 1rem;
        font-weight: 600;
        color: white;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.3);
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        transition: transform 0.3s, box-shadow 0.3s;
    }
    .btn-approve { background: linear-gradient(135deg, #56ab2f, #a8e063); }
    .btn-reject { background: linear-gradient(135deg, #ff416c, #ff4b2b); }

    .btn-approve::before, .btn-reject::before, .modal button::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%; height: 100%;
        background: rgba(255,255,255,0.15);
        transform: skewX(-20deg);
        animation: slideGlide 3s linear infinite;
    }
    @keyframes slideGlide {
        0% { left: -100%; }
        50% { left: 100%; }
        100% { left: -100%; }
    }

    .btn-approve:hover, .btn-reject:hover, .modal button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

    /* Scrollbar */
    .scrollbar::-webkit-scrollbar { width: 6px; }
    .scrollbar::-webkit-scrollbar-thumb { background-color: rgba(62, 47, 47, 0.5); border-radius: 3px; }

    .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 600; transition: background 0.4s, color 0.4s; }

    @keyframes fadeIn { from {opacity:0; transform: translateY(5px);} to {opacity:1; transform: translateY(0);} }

    /* Modal */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 50; }
    .modal { background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2); padding: 2rem; border-radius: 1rem; max-width: 400px; width: 90%; text-align: center; position: relative; color: #3e2f2f; overflow: hidden; transition: background 0.4s, color 0.4s, border-color 0.4s; }
    .modal::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: rgba(255,255,255,0.2); transform: skewX(-20deg); animation: slideGlide 3s linear infinite; pointer-events: none; }
    .modal h2 { font-size: 1.5rem; margin-bottom: 1rem; }
    .modal button { margin-top: 1rem; padding: 0.5rem 1.5rem; border-radius: 1rem; border: none; cursor: pointer; background: #8b5e3c; color: #fff; font-weight: 600; backdrop-filter: blur(10px); }

    /* Slide-Glide Hover for Categories */
    #requestDetails div.p-4 { position: relative; transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease, border 0.3s ease; border: 1px solid rgba(255,255,255,0.2); overflow: hidden; }
    #requestDetails div.p-4::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: rgba(255,255,255,0.2); transform: skewX(-20deg); transition: left 0.5s ease; }
    #requestDetails div.p-4:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.4); }
    #requestDetails div.p-4:hover::before { left: 100%; }

    /* Dark/Light Mode Toggle */
    #themeToggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(10px);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 100;
        transition: background 0.4s;
    }
    #themeToggle:hover { background: rgba(255,255,255,0.35); }
    #toggleIcon { font-size: 1.2rem; transition: transform 0.4s, color 0.4s; }
</style>
</head>
<body>

<!-- LIST VIEW -->
<div id="listView" class="hidden p-4">
  <div class="container mx-auto max-w-7xl">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">Pending Partnership Requests</h1>
    </div>
    
    <div id="requestsList" class="grid gap-4">
      <p class="opacity-60 text-center py-8">Loading requests...</p>
    </div>
  </div>
</div>

<!-- SINGLE PARTNERSHIP REVIEW VIEW -->
<div id="reviewView" class="hidden">

<!-- Dark/Light Mode Toggle -->
<div id="themeToggle">
    <i id="toggleIcon" class="fas fa-sun text-yellow-500"></i>
</div>

<!-- Background Steam -->
<div class="steam"></div>
<div class="steam"></div>
<div class="steam"></div>
<div class="steam"></div>

<div class="container mx-auto max-w-7xl p-4">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Request Details - Left Side -->
        <div id="requestDetails" class="lg:col-span-1 glass-card p-6 rounded-2xl shadow-lg space-y-4">
            <h2 class="text-xl font-bold border-b border-white/30 pb-2 mb-4 flex items-center gap-2">
                <span class="coffee-cup"><i class="fas fa-mug-saucer"></i></span>
                Request Details
            </h2>
            <div id="cafeName" class="p-4 rounded-md bg-white/20 font-medium text-center"></div>
            <div id="vendorName" class="p-4 rounded-md bg-white/20 font-medium text-center"></div>
            <div id="productName" class="p-4 rounded-md bg-white/20 font-medium text-center"></div>
            <div id="productPrice" class="p-4 rounded-md bg-white/20 text-sm text-center"></div>
            <div id="productCategory" class="p-4 rounded-md bg-white/20 text-sm text-center"></div>
            <div id="proposedTerms" class="p-4 rounded-md bg-white/20 font-medium text-center"></div>
            <div id="messageBox" class="p-4 h-40 rounded-md bg-white/10 text-sm scrollbar overflow-y-auto text-center"></div>
            
            <!-- Decision Buttons -->
            <div class="flex gap-4 mt-6 pt-4 border-t border-white/20">
                <button id="approveBtn" class="btn-approve flex-1">
                    <i class="fas fa-check mr-2"></i>Approve
                </button>
                <button id="rejectBtn" class="btn-reject flex-1">
                    <i class="fas fa-times mr-2"></i>Reject
                </button>
            </div>
        </div>

        <!-- Product Image - Right Side -->
        <div id="productImageContainer" class="lg:col-span-2 glass-card p-6 rounded-2xl shadow-lg flex flex-col items-center justify-center min-h-96">
            <img id="productImageImg" src="" alt="Product" class="max-w-full max-h-96 rounded-lg shadow-2xl object-cover" style="display: none;">
            <div id="imagePlaceholder" class="text-center opacity-60">
                <i class="fas fa-image text-6xl mb-4"></i>
                <p>No image available</p>
            </div>
        </div>

    </div>
</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const requestId = params.get("request_id");
const listView = document.getElementById('listView');
const reviewView = document.getElementById('reviewView');

// Dark/Light Toggle
const toggle = document.getElementById('themeToggle');
const toggleIcon = document.getElementById('toggleIcon');
let darkMode = false;

function applyTheme() {
    if(darkMode){
        document.body.style.background = 'linear-gradient(135deg, #2c2c2c, #1a1a1a)';
        document.body.style.color = '#f5f5f5';
        toggleIcon.className = 'fas fa-moon text-gray-200';
        document.querySelectorAll('.glass-card, #requestDetails div.p-4, .btn-approve, .btn-reject').forEach(el => {
            el.style.backgroundColor = 'rgba(255,255,255,0.05)';
            el.style.color = '#f5f5f5';
            el.style.borderColor = 'rgba(255,255,255,0.2)';
        });
    } else {
        document.body.style.background = 'linear-gradient(135deg, #a9746e, #f4e1d2)';
        document.body.style.color = '#3e2f2f';
        toggleIcon.className = 'fas fa-sun text-yellow-500';
        document.querySelectorAll('.glass-card, #requestDetails div.p-4, .btn-approve, .btn-reject').forEach(el => {
            el.style.backgroundColor = 'rgba(255,255,255,0.15)';
            el.style.color = '#3e2f2f';
            el.style.borderColor = 'rgba(255,255,255,0.2)';
        });
    }
}

toggle.addEventListener('click', () => {
    darkMode = !darkMode;
    applyTheme();
});

if (requestId) {
  // Show single partnership review
  reviewView.classList.remove('hidden');
  
  fetch(`../backend/admin/get_partnership.php?request_id=${requestId}`)
    .then(res => res.json())
    .then(r => {
      if (!r.request_id) {
          alert("Request not found");
          return;
      }

      document.getElementById("cafeName").innerHTML =
        `<i class="fas fa-coffee"></i> Cafe: ${r.cafe_name}`;

      document.getElementById("vendorName").innerHTML =
        `<i class="fas fa-store"></i> Vendor: ${r.vendor_name}`;

      document.getElementById("productName").innerHTML =
        `<i class="fas fa-box"></i> Product: <strong>${r.product_name || 'N/A'}</strong>`;

      if (r.image_url) {
        const imgElement = document.getElementById('productImageImg');
        const placeholder = document.getElementById('imagePlaceholder');
        imgElement.src = "../" + r.image_url;
        imgElement.style.display = 'block';
        if (placeholder) placeholder.style.display = 'none';
      }

      document.getElementById("productPrice").innerHTML =
        `<strong>Price:</strong> ₱${r.price ? parseFloat(r.price).toFixed(2) : 'N/A'}`;

      document.getElementById("productCategory").innerHTML =
        `<strong>Category:</strong> ${r.category || 'N/A'}`;

      document.getElementById("proposedTerms").innerHTML =
        `<i class="fas fa-handshake"></i> ${r.proposed_terms || "—"}`;

      document.getElementById("messageBox").innerHTML =
        `<strong>Message:</strong><br>${r.message || "—"}`;
    })
    .catch(err => {
      console.error('Error loading partnership:', err);
      alert("Error loading partnership details");
    });

  // Set up decision buttons
  const approveBtn = document.getElementById('approveBtn');
  const rejectBtn = document.getElementById('rejectBtn');

  approveBtn.onclick = () => handleDecision("approve");
  rejectBtn.onclick = () => handleDecision("reject");

  function handleDecision(action) {
    if (!requestId) {
      alert("Invalid request ID");
      return;
    }

    fetch("../backend/admin/approve_reject_partnership.php", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        request_id: requestId,
        action: action
      })
    })
    .then(res => res.json())
    .then(data => {
      if (!data.success) {
        alert(data.message || "Action failed");
        return;
      }

      // ✅ AUTO-REDIRECT BACK TO DASHBOARD
      setTimeout(() => {
        window.location.href = "14.C4F3_Admin_Dashboard_Page.html";
      }, 800);
    })
    .catch(err => {
      console.error(err);
      alert("Server error");
    });
  }

} else {
  // Show list of pending partnerships
  listView.classList.remove('hidden');
  
  fetch('../backend/admin/get_pending_partnerships.php')
    .then(res => res.json())
    .then(requests => {
      const requestsList = document.getElementById('requestsList');
      
      if (!requests || requests.length === 0) {
        requestsList.innerHTML = "<p class='opacity-60 text-center py-8'>No pending partnership requests</p>";
        return;
      }
      
      requestsList.innerHTML = requests.map(r => `
        <div class="glass-card p-6 rounded-2xl flex justify-between items-center gap-4">
          <div class="flex-1 flex gap-4 items-center">
            ${r.image_url ? `<img src="../${r.image_url}" alt="Product" class="w-24 h-24 rounded-lg object-cover shadow-md">` : `<div class="w-24 h-24 rounded-lg bg-white/20 flex items-center justify-center"><i class="fas fa-image opacity-40 text-2xl"></i></div>`}
            <div>
              <h3 class="font-bold text-lg">🤝 ${r.cafe_name} ← ${r.vendor_name}</h3>
              <p class="text-sm opacity-70 mt-1">Product: ${r.product_name || 'N/A'}</p>
              <p class="text-sm opacity-70">Price: ₱${r.price ? parseFloat(r.price).toFixed(2) : 'N/A'}</p>
              <p class="text-xs opacity-60 mt-2">Requested: ${new Date(r.created_at).toLocaleDateString()}</p>
            </div>
          </div>
          <button class="btn-approve" onclick="location.href='16.C4F3_Admin_Partnership_Review_Page.html?request_id=${r.request_id}'">
            Review
          </button>
        </div>
      `).join('');
    })
    .catch(err => {
      console.error('Error loading partnerships:', err);
      document.getElementById('requestsList').innerHTML = "<p class='opacity-60 text-center py-8'>Error loading requests</p>";
    });
}

// Initialize theme
applyTheme();

</script>

</body>
</html>
